apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: worldcup-rag
data:
  datasources-prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: worldcup-rag
        orgId: 1
        folder: World Cup RAG
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
