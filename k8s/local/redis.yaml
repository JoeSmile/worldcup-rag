apiVersion: v1
kind: Service
metadata:
  name: worldcup-redis
  namespace: worldcup-rag
spec:
  selector:
    app: worldcup-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worldcup-redis
  namespace: worldcup-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worldcup-redis
  template:
    metadata:
      labels:
        app: worldcup-redis
    spec:
      containers:
        - name: redis
          image: redis/redis-stack:7.4.0-v1
          ports:
            - containerPort: 6379
          args: ["--appendonly", "yes"]
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
