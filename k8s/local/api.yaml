apiVersion: v1
kind: Service
metadata:
  name: worldcup-rag-api
  namespace: worldcup-rag
  labels:
    app: worldcup-rag-api
spec:
  selector:
    app: worldcup-rag-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worldcup-rag-api
  namespace: worldcup-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worldcup-rag-api
  template:
    metadata:
      labels:
        app: worldcup-rag-api
    spec:
      containers:
        - name: api
          image: worldcup-rag:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: worldcup-rag-env
            - secretRef:
                name: worldcup-rag-secrets
          volumeMounts:
            - name: app-config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: app-config
          configMap:
            name: worldcup-rag-app-config
            items:
              - key: config.yaml
                path: config.yaml
