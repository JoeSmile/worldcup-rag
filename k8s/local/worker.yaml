apiVersion: apps/v1
kind: Deployment
metadata:
  name: worldcup-rag-worker
  namespace: worldcup-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worldcup-rag-worker
  template:
    metadata:
      labels:
        app: worldcup-rag-worker
    spec:
      containers:
        - name: worker
          image: worldcup-rag:local
          imagePullPolicy: IfNotPresent
          command: ["python", "worker.py"]
          envFrom:
            - configMapRef:
                name: worldcup-rag-env
            - secretRef:
                name: worldcup-rag-secrets
          volumeMounts:
            - name: app-config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: app-config
          configMap:
            name: worldcup-rag-app-config
            items:
              - key: config.yaml
                path: config.yaml
