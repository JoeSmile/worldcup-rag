apiVersion: v1
kind: Service
metadata:
  name: worldcup-postgres
  namespace: worldcup-rag
spec:
  selector:
    app: worldcup-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worldcup-postgres
  namespace: worldcup-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worldcup-postgres
  template:
    metadata:
      labels:
        app: worldcup-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: worldcup-rag-env
                  key: PG_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worldcup-rag-secrets
                  key: PG_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: worldcup-rag-env
                  key: PG_DATABASE
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
