# Reference Prometheus scrape config (local / manual installs).
#
# Docker Compose generates prometheus.yml at container start — see docker-compose.yml.
# Default targets assume API on host + MCP stack in compose (--profile mcp).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: worldcup-rag-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: mcp-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8080"]

  - job_name: mcp-stack-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8081"]
