services:
  # METRICS_PUBLIC_ENDPOINT defaults to true in config.yaml (fine for local dev).
  postgres:
    image: pgvector/pgvector:pg16
    container_name: worldcup-rag-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memoryos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoryos}
      POSTGRES_DB: ${POSTGRES_DB:-memoryos}
      TZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memoryos} -d ${POSTGRES_DB:-memoryos}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis/redis-stack:${REDIS_STACK_VERSION:-7.4.0-v1}
    container_name: worldcup-rag-redis-stack
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_INSIGHT_PORT:-8001}:8001"
    environment:
      REDIS_ARGS: ${REDIS_ARGS:---appendonly yes}
    volumes:
      - redis-data:/data
    healthcheck:
      test: >
        sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
          redis-cli -a "$$REDIS_PASSWORD" ping;
        else
          redis-cli ping;
        fi'
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: worldcup-rag-prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROMETHEUS_SCRAPE_TARGET: ${PROMETHEUS_SCRAPE_TARGET:-host.docker.internal:8000}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        cat > /etc/prometheus/prometheus.yml <<EOF
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
        scrape_configs:
          - job_name: worldcup-rag-api
            metrics_path: /metrics
            static_configs:
              - targets: ["$${PROMETHEUS_SCRAPE_TARGET}"]
        EOF
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus
    volumes:
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: worldcup-rag-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
    # admin123 local password
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

volumes:
  postgres-data:
    name: worldcup_rag_postgres_data
  redis-data:
    name: worldcup_rag_redis_data
  prometheus-data:
    name: worldcup_rag_prometheus_data
  grafana-data:
    name: worldcup_rag_grafana_data
