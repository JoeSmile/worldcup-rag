services:
  # METRICS_PUBLIC_ENDPOINT defaults to true in config.yaml (fine for local dev).
  postgres:
    image: pgvector/pgvector:pg16
    container_name: worldcup-rag-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memoryos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoryos}
      POSTGRES_DB: ${POSTGRES_DB:-memoryos}
      TZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memoryos} -d ${POSTGRES_DB:-memoryos}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis/redis-stack:${REDIS_STACK_VERSION:-7.4.0-v1}
    container_name: worldcup-rag-redis-stack
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
      - "${REDIS_INSIGHT_PORT:-8001}:8001"
    environment:
      REDIS_ARGS: ${REDIS_ARGS:---appendonly yes}
    volumes:
      - redis-data:/data
    healthcheck:
      test: >
        sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
          redis-cli -a "$$REDIS_PASSWORD" ping;
        else
          redis-cli ping;
        fi'
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: worldcup-rag-prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROMETHEUS_SCRAPE_TARGET: ${PROMETHEUS_SCRAPE_TARGET:-host.docker.internal:8000}
      MCP_GATEWAY_SCRAPE_TARGET: ${MCP_GATEWAY_SCRAPE_TARGET:-mcp-gateway:8080}
      MCP_METRICS_SCRAPE_TARGET: ${MCP_METRICS_SCRAPE_TARGET:-mcp-metrics:8081}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        cat > /etc/prometheus/prometheus.yml <<EOF
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
        scrape_configs:
          - job_name: worldcup-rag-api
            metrics_path: /metrics
            static_configs:
              - targets: ["$${PROMETHEUS_SCRAPE_TARGET}"]
          - job_name: mcp-gateway
            metrics_path: /metrics
            static_configs:
              - targets: ["$${MCP_GATEWAY_SCRAPE_TARGET}"]
          - job_name: mcp-stack-exporter
            metrics_path: /metrics
            static_configs:
              - targets: ["$${MCP_METRICS_SCRAPE_TARGET}"]
        EOF
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus
    volumes:
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: worldcup-rag-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
    # admin123 local password
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

  mcp-gateway:
    profiles: ["mcp"]
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    container_name: worldcup-rag-mcp-gateway
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    environment:
      GATEWAY_MCP_CONFIG: /app/mcp/gateway/.mcp.json
      GATEWAY_RULES: /app/mcp/gateway/.mcp-gateway-rules.json
      GATEWAY_DEFAULT_AGENT: ${MCP_GATEWAY_DEFAULT_AGENT:-worldcup-external}
      GATEWAY_TRANSPORT: ${GATEWAY_TRANSPORT:-http}
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      PYTHONPATH: /app
    ports:
      - "${MCP_GATEWAY_PORT:-8080}:8080"
    # NOTE: agent-mcp-gateway M1 runs stdio only — this container exits immediately and
    # does NOT listen on 8080 until upstream HTTP transport (M2) lands. See mcp/README.md.
    command: ["/bin/bash", "/app/scripts/run-mcp-gateway.sh"]

  mcp-metrics:
    profiles: ["mcp"]
    image: python:3.12-slim
    container_name: worldcup-rag-mcp-metrics
    restart: unless-stopped
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    environment:
      MCP_GATEWAY_CONFIG: /app/mcp/gateway/.mcp.json
      MCP_GATEWAY_HEALTH_URL: ${MCP_GATEWAY_HEALTH_URL:-http://host.docker.internal:8080/health}
      MCP_GATEWAY_METRICS_URL: ${MCP_GATEWAY_METRICS_URL:-http://host.docker.internal:8080/metrics}
      MCP_METRICS_HOST: 0.0.0.0
      MCP_METRICS_PORT: 8081
    ports:
      - "${MCP_METRICS_PORT:-8081}:8081"
    command:
      - /bin/sh
      - -ec
      - |
        pip install -q prometheus_client
        exec python3 mcp/monitoring/exporter.py

volumes:
  postgres-data:
    name: worldcup_rag_postgres_data
  redis-data:
    name: worldcup_rag_redis_data
  prometheus-data:
    name: worldcup_rag_prometheus_data
  grafana-data:
    name: worldcup_rag_grafana_data
