# Application cache tuning (override via env CACHE_* where supported)
cache:
  enabled: true
  l1:
    maxsize: 100        # production: 10000
    ttl: 60             # seconds; production: 300
  l2:
    ttl: 86400          # 1 day; production: 604800 (7 days)
  semantic:
    enabled: true
    threshold: 0.88     # COSINE similarity; try 0.88~0.95 for sports QA
    ttl: 86400
    knn: 3
    max_entries: 1000000
    vector_algorithm: HNSW  # HNSW | FLAT
  null:
    ttl: 600            # 10 minutes for cache penetration guard
    marker: "NULL_RESULT"

# Post-chat async queue (Redis Stream) + session summary compression
queue:
  enabled: true
  stream_key: worldcup-rag:post-chat
  consumer_group: post-chat-workers
  defer_cache_write: true   # move semantic/exact cache write off hot path
  block_ms: 5000
  batch_size: 10

summary:
  enabled: true
  compress_after_turns: 6     # trigger after N user turns
  token_threshold: 2500       # or when session token estimate exceeds this
  keep_recent_turns: 4        # messages kept verbatim after compress
  model_name: qwen-turbo

# Security pipeline (inbound sanitize → agent → outbound scan)
security:
  enabled: true
  sanitize_input: true
  scan_output: true
  scan_sql_generated: true
  redact_output_on_issue: true
  block_sql_injection_in_query: true
  audit_log: true
  redact_placeholder: "[REDACTED]"
  entropy_scan_enabled: true
  entropy_min_token_length: 24
  entropy_threshold: 4.2
